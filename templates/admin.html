<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Dental Hothaifa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Manage Users</h1>
            <a href="/" class="text-teal-600 font-semibold">← Back to App</a>
        </div>
        <div id="user-list" class="space-y-3 mb-8"></div>
        <div class="bg-white rounded-2xl p-6 shadow">
            <h2 class="font-bold mb-4">Add New User</h2>
            <div class="grid grid-cols-2 gap-3">
                <input id="new-username" class="border border-gray-300 rounded-xl p-2" placeholder="Username">
                <input id="new-password" type="password" class="border border-gray-300 rounded-xl p-2" placeholder="Password">
            </div>
            <button onclick="addUser()" class="mt-3 bg-teal-600 text-white px-4 py-2 rounded-xl font-semibold">Add User</button>
        </div>
    </div>
    <script>
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            document.getElementById('user-list').innerHTML = users.map(u => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-medium">${u.username}</p>
                        <p class="text-xs text-gray-500">Active: ${u.is_active ? '✅ Yes' : '❌ No'}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleUser(${u.id}, ${!u.is_active})" class="text-sm ${u.is_active ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} px-3 py-1 rounded-lg">${u.is_active ? 'Disable' : 'Enable'}</button>
                        <button onclick="deleteUser(${u.id})" class="text-sm bg-red-200 text-red-700 px-3 py-1 rounded-lg">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function addUser() {
            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            if(!username || !password) return alert('Fill both fields');
            await fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            loadUsers();
        }

        async function toggleUser(id, active) {
            await fetch('/api/admin/users', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, is_active: active}) });
            loadUsers();
        }

        async function deleteUser(id) {
            if(confirm('Delete this user?')) {
                await fetch(`/api/admin/users?id=${id}`, { method:'DELETE' });
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
