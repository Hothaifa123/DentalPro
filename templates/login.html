<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dental Hothaifa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-4">🦷</div>
            <h2 class="text-2xl font-bold text-gray-800">Dental Hothaifa Pro</h2>
            <p class="text-gray-500 mt-1">Enter your credentials</p>
        </div>
        {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-xl mb-4">{{ error }}</div>
        {% endif %}
        <form method="post" class="space-y-4">
            <input type="text" name="username" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none" placeholder="Username" required>
            <input type="password" name="password" class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none" placeholder="Password" required>
            <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded-xl font-semibold hover:bg-teal-700 transition">Sign In</button>
        </form>
    </div>
</body>
</html>
